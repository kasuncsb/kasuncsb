name: Update Streak Stats

on:
  schedule:
    - cron: "0 */4 * * *" # Run every 4 hours
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Streak Stats (Isocalendar)
        uses: lowlighter/metrics@latest
        with:
          filename: github-streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Colombo # Optional: Set user's timezone if known, defaults to UTC
          experimental_features: --optimize-svg
          # Customization to match Tokyo Night theme
          config_style: |
            .isocalendar-day { fill: #00ffc8 !important; }
            .isocalendar-day[data-count="0"] { fill: #161b22 !important; }
            text { fill: #8B949E !important; }
