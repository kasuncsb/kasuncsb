name: Update Streak Stats

on:
  schedule:
    - cron: "0 */4 * * *" # Run every 4 hours
  workflow_dispatch: # Allows manual run

jobs:
  build:
    name: Update Streak Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate Streak Stats SVG
        uses: DenverCoder1/github-readme-streak-stats@v2
        with:
          github_user: KasunCSB
          svg_out_path: github-streak-stats.svg
          theme: tokyonight
          hide_border: true
          background: "0D1117"
          stroke: "00ffc8"
          ring: "00ffc8"
          fire: "00ffc8"
          currStreakNum: "00ffc8"
          currStreakLabel: "8B949E"
          sideNums: "00ffc8"
          sideLabels: "8B949E"
          dates: "8B949E"

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update streak stats [skip ci]"
          file_pattern: github-streak-stats.svg
