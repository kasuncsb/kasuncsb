<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradient Mask for Fading at Bottom -->
    <linearGradient id="fadeBottom" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
    <mask id="maskBottom">
      <rect x="0" y="0" width="100%" height="100%" fill="url(#fadeBottom)"/>
    </mask>

    <!-- Distortion Filter (Glitch Effect) -->
    <filter id="glitch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise">
         <!-- Animate noise frequency to make it 'jitter' -->
         <animate attributeName="baseFrequency" values="0.05;0.055;0.05" dur="0.2s" repeatCount="indefinite"/>
         <animate attributeName="seed" values="0;100;0" dur="0.5s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <style>
    .col { font-family: 'Consolas', 'Monaco', monospace; font-size: 20px; fill: #0F0; text-anchor: middle; font-weight: bold; opacity: 0.9; }
    /* Apply glitch filter randomly to some columns or all lightly */
  </style>

  <symbol id="stream">
     <text x="0" y="0" class="col" writing-mode="tb" text-orientation="upright" letter-spacing="4" filter="url(#glitch)">
       X 9 P 2 L M 0 Z 5 K R 1 Q 8 B 4 W 7 J 3 Y 6 V N D H G F
     </text>
  </symbol>

  <!-- Main Group with Mask applied -->
  <g mask="url(#maskBottom)">
      
      <!-- Columns -->
      <g transform="translate(20,0)">
        <use href="#stream" y="-300">
          <animate attributeName="y" from="-300" to="320" dur="2.1s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite" />
        </use>
      </g>
      
      <g transform="translate(60,0)">
        <use href="#stream" y="-400">
          <animate attributeName="y" from="-400" to="320" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
        </use>
      </g>
      
      <g transform="translate(100,0)">
        <use href="#stream" y="-350">
          <animate attributeName="y" from="-350" to="320" dur="1.8s" repeatCount="indefinite" begin="0.5s"/>
        </use>
      </g>
    
      <g transform="translate(140,0)">
        <use href="#stream" y="-450">
           <animate attributeName="y" from="-450" to="320" dur="3s" repeatCount="indefinite" begin="1s"/>
        </use>
      </g>
    
       <g transform="translate(180,0)">
        <use href="#stream" y="-300">
          <animate attributeName="y" from="-300" to="320" dur="2.2s" repeatCount="indefinite" begin="0.1s"/>
        </use>
      </g>
      
      <g transform="translate(220,0)">
        <use href="#stream" y="-500">
          <animate attributeName="y" from="-500" to="320" dur="2.7s" repeatCount="indefinite" begin="0.7s"/>
        </use>
      </g>
    
      <g transform="translate(260,0)">
         <use href="#stream" y="-300">
           <animate attributeName="y" from="-300" to="320" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
         </use>
      </g>
      
       <g transform="translate(300,0)">
         <use href="#stream" y="-400">
           <animate attributeName="y" from="-400" to="320" dur="2.9s" repeatCount="indefinite" begin="0.3s"/>
         </use>
      </g>
    
      <!-- More density -->
      <g transform="translate(340,0)"> <use href="#stream" y="-350"> <animate attributeName="y" from="-350" to="320" dur="2.3s" repeatCount="indefinite" begin="0.9s"/> </use> </g>
      <g transform="translate(380,0)"> <use href="#stream" y="-450"> <animate attributeName="y" from="-450" to="320" dur="2.0s" repeatCount="indefinite" begin="0.4s"/> </use> </g>
      <g transform="translate(420,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="3.1s" repeatCount="indefinite" begin="1.5s"/> </use> </g>
      <g transform="translate(460,0)"> <use href="#stream" y="-400"> <animate attributeName="y" from="-400" to="320" dur="1.7s" repeatCount="indefinite" begin="0.8s"/> </use> </g>
      <g transform="translate(500,0)"> <use href="#stream" y="-550"> <animate attributeName="y" from="-550" to="320" dur="2.8s" repeatCount="indefinite" begin="0.2s"/> </use> </g>
      <g transform="translate(540,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="2.4s" repeatCount="indefinite" begin="1.1s"/> </use> </g>
      <g transform="translate(580,0)"> <use href="#stream" y="-450"> <animate attributeName="y" from="-450" to="320" dur="1.9s" repeatCount="indefinite" begin="0.6s"/> </use> </g>
      
      <g transform="translate(620,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="2.6s" repeatCount="indefinite" begin="1.3s"/> </use> </g>
      <g transform="translate(660,0)"> <use href="#stream" y="-380"> <animate attributeName="y" from="-380" to="320" dur="2.2s" repeatCount="indefinite" begin="0.1s"/> </use> </g>
      <g transform="translate(700,0)"> <use href="#stream" y="-480"> <animate attributeName="y" from="-480" to="320" dur="3.2s" repeatCount="indefinite" begin="1.8s"/> </use> </g>
      <g transform="translate(740,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="1.6s" repeatCount="indefinite" begin="0.9s"/> </use> </g>
      <g transform="translate(780,0)"> <use href="#stream" y="-420"> <animate attributeName="y" from="-420" to="320" dur="2.9s" repeatCount="indefinite" begin="0.4s"/> </use> </g>
      
      <g transform="translate(820,0)"> <use href="#stream" y="-350"> <animate attributeName="y" from="-350" to="320" dur="2.5s" repeatCount="indefinite" begin="1.4s"/> </use> </g>
      <g transform="translate(860,0)"> <use href="#stream" y="-500"> <animate attributeName="y" from="-500" to="320" dur="2.1s" repeatCount="indefinite" begin="0.3s"/> </use> </g>
      <g transform="translate(900,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="3.0s" repeatCount="indefinite" begin="1.0s"/> </use> </g>
      <g transform="translate(940,0)"> <use href="#stream" y="-450"> <animate attributeName="y" from="-450" to="320" dur="1.8s" repeatCount="indefinite" begin="0.7s"/> </use> </g>
      <g transform="translate(980,0)"> <use href="#stream" y="-320"> <animate attributeName="y" from="-320" to="320" dur="2.7s" repeatCount="indefinite" begin="1.6s"/> </use> </g>
    
      <g transform="translate(1020,0)"> <use href="#stream" y="-400"> <animate attributeName="y" from="-400" to="320" dur="2.3s" repeatCount="indefinite" begin="0.2s"/> </use> </g>
      <g transform="translate(1060,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="3.3s" repeatCount="indefinite" begin="1.2s"/> </use> </g>
      <g transform="translate(1100,0)"> <use href="#stream" y="-500"> <animate attributeName="y" from="-500" to="320" dur="2.0s" repeatCount="indefinite" begin="0.5s"/> </use> </g>
      <g transform="translate(1140,0)"> <use href="#stream" y="-350"> <animate attributeName="y" from="-350" to="320" dur="2.8s" repeatCount="indefinite" begin="1.9s"/> </use> </g>
      <g transform="translate(1180,0)"> <use href="#stream" y="-450"> <animate attributeName="y" from="-450" to="320" dur="2.2s" repeatCount="indefinite" begin="0.8s"/> </use> </g>
      
      <g transform="translate(1220,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="3.1s" repeatCount="indefinite" begin="1.5s"/> </use> </g>
      <g transform="translate(1260,0)"> <use href="#stream" y="-400"> <animate attributeName="y" from="-400" to="320" dur="1.9s" repeatCount="indefinite" begin="0.3s"/> </use> </g>
      <g transform="translate(1300,0)"> <use href="#stream" y="-350"> <animate attributeName="y" from="-350" to="320" dur="2.6s" repeatCount="indefinite" begin="1.1s"/> </use> </g>
      <g transform="translate(1340,0)"> <use href="#stream" y="-500"> <animate attributeName="y" from="-500" to="320" dur="2.4s" repeatCount="indefinite" begin="0.6s"/> </use> </g>
      <g transform="translate(1380,0)"> <use href="#stream" y="-300"> <animate attributeName="y" from="-300" to="320" dur="3.4s" repeatCount="indefinite" begin="1.7s"/> </use> </g>
      <g transform="translate(1420,0)"> <use href="#stream" y="-450"> <animate attributeName="y" from="-450" to="320" dur="2.1s" repeatCount="indefinite" begin="0.2s"/> </use> </g>
  </g>
</svg>
