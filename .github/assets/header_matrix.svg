<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0d0208"/>
  <style>
    .matrix { font-family: 'Courier New', monospace; font-weight: bold; fill: #00ff41; font-size: 20px; opacity: 0.8; }
    .trail { fill: url(#trailGradient); }
  </style>
  <defs>
    <linearGradient id="trailGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="1"/> <!-- White tip for the leading character -->
    </linearGradient>
  </defs>

  <!-- Generating random columns of falling text -->
  <!-- Column 1 -->
  <text x="50" y="-100" class="matrix">
    1 0 1 1 0
    <animate attributeName="y" values="-100;400" dur="2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
  </text>
  
  <!-- Column 2 (slower) -->
  <text x="150" y="-150" class="matrix">
    0 1 0 0 1
    <animate attributeName="y" values="-150;400" dur="3s" repeatCount="indefinite" begin="1s"/>
  </text>

  <!-- Column 3 (faster) -->
  <text x="250" y="-100" class="matrix">
    1 1 1 0 0
    <animate attributeName="y" values="-100;400" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </text>

  <!-- Column 4 -->
  <text x="350" y="-200" class="matrix">
    0 0 1 1 1
    <animate attributeName="y" values="-200;400" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
  </text>

  <!-- Column 5 -->
  <text x="450" y="-50" class="matrix">
    1 0 0 1 0
    <animate attributeName="y" values="-50;450" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
  </text>

  <!-- Column 6 -->
  <text x="550" y="-120" class="matrix">
    0 1 1 0 1
    <animate attributeName="y" values="-120;400" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
  </text>

    <!-- Column 7 -->
  <text x="650" y="-180" class="matrix">
    1 1 0 1 1
    <animate attributeName="y" values="-180;400" dur="2.7s" repeatCount="indefinite" begin="0.1s"/>
  </text>

  <!-- Column 8 -->
  <text x="750" y="-100" class="matrix">
    0 0 0 0 0
    <animate attributeName="y" values="-100;400" dur="3.5s" repeatCount="indefinite" begin="1.2s"/>
  </text>

   <!-- Column 9 -->
  <text x="850" y="-150" class="matrix">
    1 0 1 0 1
    <animate attributeName="y" values="-150;400" dur="2.1s" repeatCount="indefinite" begin="0.9s"/>
  </text>

  <!-- Column 10 -->
  <text x="950" y="-90" class="matrix">
    0 1 0 1 0
    <animate attributeName="y" values="-90;400" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
  </text>

   <!-- Column 11 -->
  <text x="1050" y="-200" class="matrix">
    1 1 1 1 1
    <animate attributeName="y" values="-200;400" dur="1.9s" repeatCount="indefinite" begin="1.8s"/>
  </text>

   <!-- Column 12 -->
  <text x="1150" y="-100" class="matrix">
    0 0 1 0 0
    <animate attributeName="y" values="-100;400" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
  </text>

  <!-- Column 13 -->
  <text x="1250" y="-140" class="matrix">
    1 0 0 0 1
    <animate attributeName="y" values="-140;400" dur="3.1s" repeatCount="indefinite" begin="1.1s"/>
  </text>

   <!-- Column 14 -->
  <text x="1350" y="-80" class="matrix">
    0 1 1 1 0
    <animate attributeName="y" values="-80;400" dur="2.0s" repeatCount="indefinite" begin="0.6s"/>
  </text>
  
  <!-- Add more density with a second layer of fainter text -->
   <!-- Column 1.5 -->
   <text x="100" y="-100" class="matrix" opacity="0.4">
    1 0 
    <animate attributeName="y" values="-100;400" dur="4s" repeatCount="indefinite" begin="2s"/>
  </text>
     <!-- Column 9.5 -->
     <text x="900" y="-100" class="matrix" opacity="0.4">
      0 1
      <animate attributeName="y" values="-100;400" dur="3.2s" repeatCount="indefinite" begin="0.5s"/>
    </text>

</svg>
