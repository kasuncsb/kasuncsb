<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0d0208"/>
  <style>
    .matrix { font-family: 'Courier New', monospace; font-weight: bold; fill: #00ff41; font-size: 20px; opacity: 0.8; }
  </style>
  
  <text x="50" y="-100" class="matrix">
    1 0 1 1 0
    <animate attributeName="y" values="-100;400" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </text>
  
  <text x="150" y="-150" class="matrix">
    0 1 0 0 1
    <animate attributeName="y" values="-150;400" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </text>

  <text x="250" y="-100" class="matrix">
    1 1 1 0 0
    <animate attributeName="y" values="-100;400" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </text>

  <text x="350" y="-200" class="matrix">
    0 0 1 1 1
    <animate attributeName="y" values="-200;400" dur="2.5s" repeatCount="indefinite" begin="0.7s"/>
  </text>

  <text x="450" y="-50" class="matrix">
    1 0 0 1 0
    <animate attributeName="y" values="-50;450" dur="2.2s" repeatCount="indefinite" begin="2s"/>
  </text>

  <text x="550" y="-120" class="matrix">
    0 1 1 0 1
    <animate attributeName="y" values="-120;400" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
  </text>

  <text x="650" y="-180" class="matrix">
    1 1 0 1 1
    <animate attributeName="y" values="-180;400" dur="2.7s" repeatCount="indefinite" begin="0.6s"/>
  </text>

  <text x="750" y="-100" class="matrix">
    0 0 0 0 0
    <animate attributeName="y" values="-100;400" dur="3.5s" repeatCount="indefinite" begin="1.7s"/>
  </text>

  <text x="850" y="-150" class="matrix">
    1 0 1 0 1
    <animate attributeName="y" values="-150;400" dur="2.1s" repeatCount="indefinite" begin="1.4s"/>
  </text>

  <text x="950" y="-90" class="matrix">
    0 1 0 1 0
    <animate attributeName="y" values="-90;400" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
  </text>

  <text x="1050" y="-200" class="matrix">
    1 1 1 1 1
    <animate attributeName="y" values="-200;400" dur="1.9s" repeatCount="indefinite" begin="2.3s"/>
  </text>

  <text x="1150" y="-100" class="matrix">
    0 0 1 0 0
    <animate attributeName="y" values="-100;400" dur="2.4s" repeatCount="indefinite" begin="0.9s"/>
  </text>

  <text x="1250" y="-140" class="matrix">
    1 0 0 0 1
    <animate attributeName="y" values="-140;400" dur="3.1s" repeatCount="indefinite" begin="1.6s"/>
  </text>

  <text x="1350" y="-80" class="matrix">
    0 1 1 1 0
    <animate attributeName="y" values="-80;400" dur="2.0s" repeatCount="indefinite" begin="1.1s"/>
  </text>
  
   <text x="200" y="-100" class="matrix" opacity="0.4">
    1 1
    <animate attributeName="y" values="-100;400" dur="4.2s" repeatCount="indefinite" begin="3s"/>
  </text>
  
   <text x="1200" y="-100" class="matrix" opacity="0.4">
    0 1
    <animate attributeName="y" values="-100;400" dur="3.8s" repeatCount="indefinite" begin="0.2s"/>
  </text>

</svg>
